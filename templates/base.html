<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "Talki" }}</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static',
      filename='tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            colors: {
              ink: "#0f172a",
              mist: "#e2e8f0",
              tealx: "#0ea5a4",
              coral: "#fb7185",
              sun: "#f59e0b",
              night: "#0b1120",
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-slate-950 text-white font-display overflow-x-hidden">
    <div class="min-h-screen relative overflow-hidden">
      <div class="absolute inset-0">
        <div class="absolute -top-32 -left-16 h-72 w-72 rounded-full bg-tealx/30 blur-3xl"></div>
        <div class="absolute top-1/3 right-0 h-96 w-96 rounded-full bg-coral/30 blur-3xl"></div>
        <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-sun/30 blur-3xl"></div>
      </div>

      <div class="relative">
        {% if nav and nav|length %}
        <header class="border-b border-white/10 bg-night/80 backdrop-blur {% if hide_nav_on_mobile %}hidden md:block{% endif %}">
          <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-5 sm:flex-row sm:items-center sm:justify-between sm:px-6">
            <div class="flex items-center gap-3">
              <div class="h-10 w-10 rounded-2xl bg-white/10 flex items-center justify-center">
                <span class="text-lg font-semibold text-tealx">T</span>
              </div>
              <div>
                <p class="text-lg font-semibold">Talki</p>
                <p class="text-xs text-white/60">Social media studio</p>
              </div>
            </div>
            <nav class="flex flex-wrap items-center gap-2 text-xs sm:text-sm">
              {% for item in nav %}
              <a
                href="{{ item.href }}"
                class="px-3 py-2 rounded-full transition {% if item.active %}bg-white text-ink{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}"
              >
                {{ item.label }}
              </a>
              {% endfor %}
              {% if current_user %}
              <a
                href="{{ url_for('logout') }}"
                class="ml-2 rounded-full border border-white/20 px-4 py-2 text-xs uppercase tracking-[0.2em] text-white/70 hover:text-white hover:border-white/50"
              >
                Log out
              </a>
              {% else %}
              <a
                href="{{ url_for('login') }}"
                class="ml-2 rounded-full border border-white/20 px-4 py-2 text-xs uppercase tracking-[0.2em] text-white/70 hover:text-white hover:border-white/50"
              >
                Log in
              </a>
              {% endif %}
            </nav>
          </div>
        </header>
        {% endif %}

        <main class="mx-auto {% if full_bleed %}max-w-none{% else %}max-w-6xl{% endif %} px-4 py-8 sm:px-6 sm:py-12">
          {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-white/10 py-8">
          <div class="mx-auto max-w-6xl px-6 text-xs text-white/50">
            Talki (C) {{ year }} - Built for conversation, connection, and creativity.
          </div>
        </footer>
      </div>
    </div>
    <script>
      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-toggle-password]");
        if (!button) return;
        const targetId = button.getAttribute("data-toggle-password");
        const input = document.getElementById(targetId);
        if (!input) return;
        if (input.type === "password") {
          input.type = "text";
          button.textContent = "Hide";
        } else {
          input.type = "password";
          button.textContent = "Show";
        }
      });
    </script>
    <!-- Toast & Modal Components -->
    <script src="{{ url_for('static', filename='components.js') }}"></script>
  </body>
</html>
