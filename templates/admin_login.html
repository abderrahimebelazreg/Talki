{% extends "base.html" %}
{% set title = "Admin Login | Talki" %}

{% block content %}
<div class="container" style="max-width: 420px; margin-top: 80px;">
  <div class="card auth-card">
    <div class="text-center mb-6">
      <div style="width: 48px; height: 48px; border-radius: var(--radius-lg); background: var(--primary-subtle); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--sp-4);">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" width="24" height="24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2 style="font-size: var(--text-2xl); font-weight: 700;">Admin Login</h2>
      <p class="text-sm text-muted mt-1">Access the Talki admin panel</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="input-field" required placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="input-field" required placeholder="Enter password">
      </div>
      <button class="btn btn-primary w-full" style="padding: 12px;">Login</button>
    </form>
  </div>
</div>
{% endblock %}
