{% extends "base.html" %}
{% set title = "Admin Settings | Talki" %}

{% block content %}
<div class="settings-layout" style="max-width: 800px;">
  <!-- Sidebar -->
  <aside class="card" style="height: fit-content;">
    <div class="section-header">Admin</div>
    <div class="settings-nav">
      <a href="{{ url_for('admin_reports') }}" class="settings-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display: inline; vertical-align: -3px; margin-right: 8px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        Reports
      </a>
      <a href="{{ url_for('admin_settings') }}" class="settings-nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display: inline; vertical-align: -3px; margin-right: 8px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
      <a href="{{ url_for('admin_logout') }}" class="settings-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display: inline; vertical-align: -3px; margin-right: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log out
      </a>
    </div>
  </aside>

  <!-- Content -->
  <section class="space-y-6">
    {% if error %}
    <div class="alert alert-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      {{ error }}
    </div>
    {% endif %}
    {% if notice %}
    <div class="alert alert-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      {{ notice }}
    </div>
    {% endif %}

    <!-- Update Admin -->
    <div class="card">
      <h2 style="font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--sp-6);">Update Current Admin</h2>
      <form method="post" class="space-y-4">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="update_admin">
        <div class="form-group">
          <label class="form-label">New username (optional)</label>
          <input type="text" name="new_username" placeholder="newadmin" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label">New password (optional)</label>
          <input type="password" name="new_password" placeholder="Leave blank to keep current" class="input-field">
        </div>
        <div class="form-group">
          <label class="form-label">Current password (required)</label>
          <input type="password" name="current_password" placeholder="Enter current password" class="input-field" required>
        </div>
        <button class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <!-- Add Admin -->
    <div class="card">
      <h2 style="font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--sp-6);">Add New Admin</h2>
      <form method="post" class="space-y-4">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="add_admin">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" placeholder="anotheradmin" class="input-field" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" placeholder="Set a password" class="input-field" required>
        </div>
        <button class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Add Admin
        </button>
      </form>
    </div>
  </section>
</div>
{% endblock %}
